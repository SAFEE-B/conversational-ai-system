version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
      - ./chroma_db:/app/chroma_db
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HUB_OFFLINE=1
    # Ensures the backend restarts if the FastAPI app crashes
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
